<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e14"/>
      <stop offset="100%" stop-color="#131a24"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3344"/>
      <stop offset="100%" stop-color="#1f2736"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="20"/>

  <!-- Title -->
  <text x="40" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#eef2f8" letter-spacing="1">🧰 Tech Stack</text>
  <line x1="40" y1="65" x2="760" y2="65" stroke="#2a3344" stroke-width="1"/>

  <!-- Categories -->
  <g font-family="Inter, sans-serif">

    <!-- AI / ML & Data -->
    <text x="40" y="110" font-size="13" font-weight="600" fill="#5a7299" letter-spacing="1">⚡ AI / ML &amp; DATA</text>
    <g transform="translate(40, 125)">
      <rect x="0" y="0" rx="20" ry="20" width="95" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="47.5" y="20" font-size="12" fill="#c9a0ff" text-anchor="middle" dominant-baseline="middle">Python</text>

      <rect x="105" y="0" rx="20" ry="20" width="100" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="155" y="20" font-size="12" fill="#c9a0ff" text-anchor="middle" dominant-baseline="middle">TensorFlow</text>

      <rect x="215" y="0" rx="20" ry="20" width="90" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="260" y="20" font-size="12" fill="#c9a0ff" text-anchor="middle" dominant-baseline="middle">PyTorch</text>

      <rect x="315" y="0" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="357.5" y="20" font-size="12" fill="#c9a0ff" text-anchor="middle" dominant-baseline="middle">OpenCV</text>

      <rect x="410" y="0" rx="20" ry="20" width="90" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="455" y="20" font-size="12" fill="#8bcbff" text-anchor="middle" dominant-baseline="middle">Streamlit</text>

      <rect x="510" y="0" rx="20" ry="20" width="80" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="550" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">MySQL</text>

      <rect x="600" y="0" rx="20" ry="20" width="95" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="647.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Pandas</text>

      <!-- second row -->
      <rect x="0" y="40" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="42.5" y="55" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">NumPy</text>

      <rect x="95" y="40" rx="20" ry="20" width="120" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="155" y="55" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Scikit-learn</text>
    </g>

    <!-- Frontend & Visualization -->
    <text x="40" y="215" font-size="13" font-weight="600" fill="#5a7299" letter-spacing="1">🖥️ FRONTEND &amp; VISUALIZATION</text>
    <g transform="translate(40, 230)">
      <rect x="0" y="0" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="42.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">HTML5</text>

      <rect x="95" y="0" rx="20" ry="20" width="75" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="132.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">CSS3</text>

      <rect x="180" y="0" rx="20" ry="20" width="95" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="227.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">JavaScript</text>

      <rect x="285" y="0" rx="20" ry="20" width="75" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="322.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">React</text>

      <rect x="370" y="0" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="412.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Vue.js</text>

      <rect x="465" y="0" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="507.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Three.js</text>

      <rect x="560" y="0" rx="20" ry="20" width="75" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="597.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">GSAP</text>
    </g>

    <!-- Backend & APIs -->
    <text x="40" y="320" font-size="13" font-weight="600" fill="#5a7299" letter-spacing="1">🧩 BACKEND &amp; APIS</text>
    <g transform="translate(40, 335)">
      <rect x="0" y="0" rx="20" ry="20" width="95" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="47.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Node.js</text>

      <rect x="105" y="0" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="147.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Express</text>

      <rect x="200" y="0" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="242.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">NestJS</text>

      <rect x="295" y="0" rx="20" ry="20" width="105" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="347.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Spring Boot</text>

      <rect x="410" y="0" rx="20" ry="20" width="100" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="460" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">REST APIs</text>

      <rect x="520" y="0" rx="20" ry="20" width="110" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="575" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">WebSockets</text>
    </g>

    <!-- Cloud & DevOps -->
    <text x="40" y="425" font-size="13" font-weight="600" fill="#5a7299" letter-spacing="1">☁️ CLOUD &amp; DEVOPS</text>
    <g transform="translate(40, 440)">
      <rect x="0" y="0" rx="20" ry="20" width="65" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="32.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">AWS</text>

      <rect x="75" y="0" rx="20" ry="20" width="85" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="117.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Docker</text>

      <rect x="170" y="0" rx="20" ry="20" width="110" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="225" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Kubernetes</text>

      <rect x="290" y="0" rx="20" ry="20" width="65" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="322.5" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">Git</text>

      <rect x="365" y="0" rx="20" ry="20" width="130" height="30" fill="url(#pillGrad)" stroke="#3d4b66" stroke-width="0.5"/>
      <text x="430" y="20" font-size="12" fill="#c8d8f0" text-anchor="middle" dominant-baseline="middle">GitHub Actions</text>
    </g>

    <!-- Key Projects -->
    <text x="40" y="530" font-size="13" font-weight="600" fill="#5a7299" letter-spacing="1">🚀 KEY PROJECTS</text>
    <g transform="translate(40, 545)">
      <rect x="0" y="0" rx="20" ry="20" width="145" height="30" fill="#1f2a3a" stroke="#3d5a80" stroke-width="1"/>
      <text x="72.5" y="20" font-size="12" fill="#b8ccff" text-anchor="middle" dominant-baseline="middle">Image Colorization</text>

      <rect x="155" y="0" rx="20" ry="20" width="130" height="30" fill="#1f2a3a" stroke="#3d5a80" stroke-width="1"/>
      <text x="220" y="20" font-size="12" fill="#b8ccff" text-anchor="middle" dominant-baseline="middle">SignBridge AI</text>

      <rect x="295" y="0" rx="20" ry="20" width="140" height="30" fill="#1f2a3a" stroke="#3d5a80" stroke-width="1"/>
      <text x="365" y="20" font-size="12" fill="#b8ccff" text-anchor="middle" dominant-baseline="middle">Face Attendance</text>

      <rect x="445" y="0" rx="20" ry="20" width="160" height="30" fill="#1f2a3a" stroke="#64c8ff" stroke-width="1"/>
      <text x="525" y="20" font-size="12" fill="#8bcbff" text-anchor="middle" dominant-baseline="middle">⭐ Real-World AI</text>
    </g>
  </g>
</svg>
